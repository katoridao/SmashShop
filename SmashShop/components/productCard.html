<style>
  .products {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media(min-width:768px) {
    .products { grid-template-columns: repeat(2, 1fr); }
  }

  @media(min-width:1200px) {
    .products { grid-template-columns: repeat(3, 1fr); }
  }

  .product-card {
    background: #1E1E1E;
    border: 1px solid #2A2A2A;
    border-radius: 18px;
    overflow: hidden;
    transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease;
  }

  .product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.35);
    border-color: #2563EB;
  }

  .product-card img {
    height: 250px;
    object-fit: cover;
    width: 100%;
    transition: transform .4s ease;
  }

  .product-card:hover img {
    transform: scale(1.05);
  }
  .product-img-wrapper {
    position: relative;
    overflow: hidden;
  }

  /* --- HIỆU ỨNG MƯỢT MÀ CHO NÚT TIM --- */
  .fav-badge {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 40px;
    height: 40px;
    background: rgba(30,30,30,0.8);
    backdrop-filter: blur(5px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    border: 1px solid #333;
  }

  .fav-badge i {
    transition: transform 0.2s ease;
  }

  .fav-badge:hover {
    background: #ff3c00;
    color: #fff;
    border-color: #ff3c00;
    transform: scale(1.1);
  }

  .fav-badge.active {
    background: #ff3c00;
    color: #fff;
    border-color: #ff3c00;
  }

  @keyframes heartPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  .product-info {
    padding: 15px;
    position: relative;
  }

  .product-info h3 {
    margin-bottom: 10px;
    font-size: 18px;
  }

  .old-price {
    text-decoration: line-through;
    color: #888;
    font-size: 14px;
  }

  .price {
    color: #2563EB;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  /* --- SỬA VỊ TRÍ BADGE GIẢM GIÁ --- */
  .discount {
    position: absolute;
    top: 15px;
    left: 15px; /* Đổi sang góc trái trên của ảnh */
    background: #ff3c00;
    color: #fff;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    z-index: 10;
    box-shadow: 0 4px 10px rgba(255, 60, 0, 0.3); /* Thêm chút bóng mờ cho nổi bật */
  }

  .discount.hidden {
    display: none;
  }

  .product-info button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #2563EB;
    color: #fff;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
  }

  .product-info button:hover {
    background: #1D4ED8;
  }
</style>

<script>
  function getFullImageUrl(thumbnail) {
    if (!thumbnail) return 'https://picsum.photos/300?random=1';
    return thumbnail.startsWith('http') ? thumbnail : 'http://localhost:3000' + thumbnail;
  }

  function formatPrice(price) {
    return Number(price).toLocaleString('vi-VN') + 'đ';
  }

  function sanitizeName(name) {
    return (name || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /**
   * Wrapper an toàn cho showToast:
   * - Ưu tiên dùng showToast() của trang host nếu đã được định nghĩa.
   * - Fallback: tự vẽ toast tối giản để component luôn hoạt động độc lập.
   */
  function _cardToast(message, type = 'info') {
    if (typeof showToast === 'function') {
      showToast(message, type);
      return;
    }
    const existing = document.getElementById('_productCardToast');
    if (existing) existing.remove();
    const colors = { success: '#22c55e', error: '#ef4444', info: '#2563EB', warning: '#F59E0B' };
    const toast = document.createElement('div');
    toast.id = '_productCardToast';
    toast.textContent = message;
    Object.assign(toast.style, {
      position: 'fixed', bottom: '24px', right: '24px', zIndex: '99999',
      background: colors[type] || colors.info, color: '#fff',
      padding: '12px 20px', borderRadius: '10px', fontSize: '14px',
      fontWeight: '600', boxShadow: '0 4px 20px rgba(0,0,0,0.3)',
      opacity: '0', transition: 'opacity 0.3s ease', maxWidth: '320px',
      fontFamily: 'inherit'
    });
    document.body.appendChild(toast);
    requestAnimationFrame(() => { toast.style.opacity = '1'; });
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  async function renderProducts(containerId, products, options = {}) {
    const {
      showDiscount = true,
      showFavorite = true,
      filterFn = null,
      onAddToCart = null,
      onToggleFavorite = null
    } = options;

    const container = document.getElementById(containerId);
    if (!container) return;

    let filteredProducts = products;
    if (filterFn && typeof filterFn === 'function') {
      filteredProducts = products.filter(filterFn);
    }

    if (filteredProducts.length === 0) {
      container.innerHTML = '<p style="color:#aaa; grid-column:1/-1; text-align:center;">Chưa có sản phẩm nào.</p>';
      return;
    }

    let favoriteIds = new Set();
    let userId = window.currentUserId || localStorage.getItem('userId');
    
    if (showFavorite && userId && userId !== 'null' && userId !== 'undefined') {
      try {
        const favRes = await fetch(`http://localhost:3000/api/users/${userId}/favorites`);
        const favData = await favRes.json();
        const favList = favData.favorites || favData.data || favData.products || [];
        favList.forEach(item => {
          const id = item._id || item.id;
          if (id) favoriteIds.add(id.toString());
        });
      } catch (err) {
        console.error("❌ Lỗi tự động đồng bộ danh sách yêu thích:", err);
      }
    }

    container.innerHTML = filteredProducts.map(p => {
      const pid = p._id || p.id;
      const imgUrl = getFullImageUrl(p.thumbnail);
      const nameSafe = sanitizeName(p.name);

      const discount = parseFloat(p.discount || 0);
      const price = parseFloat(p.price || 0);
      const finalPrice = price - (price * discount / 100);

      const finalPriceFmt = formatPrice(Math.round(finalPrice));
      const originPriceFmt = formatPrice(price);
      const discountPct = Math.round(discount);

      const oldPriceHtml = discount > 0 
        ? `<div class="old-price">${originPriceFmt}</div>` 
        : '';

      const discountBadge = showDiscount && discount > 0
        ? `<div class="discount">-${discountPct}%</div>`
        : `<div class="discount hidden"></div>`;

      const safeAttrName = nameSafe.replace(/'/g, "\\'").replace(/"/g, '&quot;');

      const isFav = favoriteIds.has(pid ? pid.toString() : '') || !!p.isFavorite; 
      const favClass = isFav ? 'fav-badge active' : 'fav-badge';
      const favIcon = isFav ? 'fa-solid fa-heart' : 'fa-regular fa-heart';

      const favoriteBadge = showFavorite
        ? `<button type="button" class="${favClass}" onclick="event.preventDefault(); event.stopPropagation(); window.productCardComponent.handleFavorite(this, '${pid}')" aria-label="Thêm vào yêu thích"><i class="${favIcon}"></i></button>`
        : '';

      // Truyền stock vào buyNow để kiểm tra tồn kho giống productdetail
      const stockVal = p.stock !== undefined ? parseInt(p.stock) : null;
      const buttonHandler = onAddToCart
        ? `onclick="window.productCardComponent.addToCart('${pid}', 1, ${stockVal})"`
        : `onclick="event.preventDefault(); window.productCardComponent.buyNow('${pid}', ${stockVal})"`;

      return `
        <div class="product-card">
          <div class="product-img-wrapper">
            ${discountBadge}
            ${favoriteBadge}
            <a href="/SmashShop/productdetail.html?id=${pid}">
              <img src="${imgUrl}" alt="${nameSafe}" loading="lazy"
                   onerror="this.src='https://picsum.photos/300?random=99'">
            </a>
          </div>
          <div class="product-info">
            <a href="/SmashShop/productdetail.html?id=${pid}">
              <h3>${nameSafe}</h3>
            </a>
            ${oldPriceHtml}
            <div class="price">${finalPriceFmt}</div>
            <button ${buttonHandler}>
              Mua ngay
            </button>
          </div>
        </div>`;
    }).join('');
  }

  window.productCardComponent = {
    renderProducts: renderProducts,
    getFullImageUrl: getFullImageUrl,
    formatPrice: formatPrice,
    sanitizeName: sanitizeName,

    // ----------------------------------------------------------------
    // HÀM DÙNG CHUNG: THÊM VÀO GIỎ HÀNG
    // Đồng bộ hoàn toàn với logic addToCart() trong productdetail.html:
    //   1. Kiểm tra đăng nhập
    //   2. Kiểm tra tồn kho (stock)
    //   3. Fetch giỏ hàng hiện tại → cộng dồn số lượng (finalQuantity)
    //   4. Kiểm tra finalQuantity không vượt stock
    //   5. Gọi PUT /cart/:userId/update (đồng nhất endpoint với detail)
    //   6. Dispatch event 'cartUpdated' để các component khác lắng nghe
    // ----------------------------------------------------------------
    async addToCart(productId, qty = 1, stock = null, quiet = false) {
      const userId = localStorage.getItem('userId');
      if (!userId || userId === 'null' || userId === 'undefined') {
        _cardToast("Vui lòng đăng nhập để mua hàng!", "error");
        return false;
      }

      if (!productId) {
        _cardToast("Lỗi: Không xác định được sản phẩm.", "error");
        return false;
      }

      // Nếu có truyền stock vào thì kiểm tra hết hàng
      if (stock !== null && stock <= 0) {
        _cardToast("Sản phẩm này đã hết hàng!", "error");
        return false;
      }

      try {
        const API_BASE = 'http://localhost:3000/api';
        let finalQuantity = qty;

        // Lấy giỏ hàng hiện tại để cộng dồn số lượng
        const cartRes = await fetch(`${API_BASE}/cart/${userId}`);
        const cartData = await cartRes.json();

        if (cartData.success && cartData.cart && cartData.cart.items) {
          const existingItem = cartData.cart.items.find(item => {
            const itemId = item.productId._id || item.productId;
            return itemId.toString() === productId.toString();
          });
          if (existingItem) {
            finalQuantity += existingItem.quantity;
          }
        }

        // Kiểm tra vượt tồn kho sau khi cộng dồn
        if (stock !== null && finalQuantity > stock) {
          _cardToast(`Không thể thêm! Số lượng trong giỏ hàng đã đạt giới hạn tồn kho (${stock} sản phẩm).`, "error");
          return false;
        }

        // Gọi API cập nhật giỏ hàng (đồng nhất endpoint với productdetail)
        const updateRes = await fetch(`${API_BASE}/cart/${userId}/update`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId, quantity: finalQuantity })
        });
        const updateData = await updateRes.json();

        if (updateData.success) {
          if (!quiet) {
            window.dispatchEvent(new Event('cartUpdated'));
            window.location.href = '/SmashShop/cart.html'; 
          }
          return true;
        } else {
          _cardToast(updateData.message || "Lỗi khi thêm vào giỏ hàng!", "error");
          return false;
        }
      } catch (error) {
        console.error("Lỗi addToCart (productCard):", error);
        _cardToast("Đã xảy ra lỗi kết nối với máy chủ!", "error");
        return false;
      }
    },

    // ----------------------------------------------------------------
    // HÀM MUA NGAY
    // Đồng bộ với handleBuyNow() trong productdetail.html:
    //   - Gọi addToCart với quiet = true (không hiện toast "đã thêm")
    //   - Nếu thành công → chuyển hướng sang cart.html
    // stock được lấy từ data-stock trên button (nếu có), mặc định null
    // ----------------------------------------------------------------
    async buyNow(productId, stock = null) {
      const success = await this.addToCart(productId, 1, stock, true);
      if (success) {
        window.location.href = '/SmashShop/cart.html';
      }
    }
    ,handleFavorite: async function(btnElement, productId) {
      let userId = window.currentUserId || localStorage.getItem('userId');
      
      if (!userId || userId === 'null' || userId === 'undefined') {
        alert("Vui lòng đăng nhập để sử dụng tính năng này!");
        return;
      }

      try {
        const res = await fetch(`http://localhost:3000/api/users/${userId}/favorites`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId })
        });
        const data = await res.json();

        if (data.success) {
          const icon = btnElement.querySelector('i');
          
          if (data.isFavorite) {
            btnElement.classList.add('active'); 
            if (icon) icon.classList.replace('fa-regular', 'fa-solid'); 
          } else {
            btnElement.classList.remove('active'); 
            if (icon) icon.classList.replace('fa-solid', 'fa-regular'); 
            
            if (window.location.pathname.includes('wishlist.html')) {
              const card = btnElement.closest('.product-card');
              if (card) card.style.display = 'none';
              
              const countSpan = document.getElementById('favoriteCount');
              if (countSpan) {
                let currentCount = parseInt(countSpan.innerText) || 0;
                countSpan.innerText = `${Math.max(0, currentCount - 1)} sản phẩm`;
              }
            }
          }
        }
      } catch (error) {
        console.error("Lỗi yêu thích:", error);
      }
    }
  };


</script>
