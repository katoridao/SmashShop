<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lịch sử đặt hàng - SmashShop</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    (function() {
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.style.background = '#f0f2f5';
      }
    })();
  </script>

  <style>

    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.88);
      --border: rgba(148, 163, 184, 0.22);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-strong: #2563eb;
      --success: #4ade80;
      --danger: #f87171;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.22), transparent 28%),
        linear-gradient(180deg, #020617, #111827 50%, #0f172a);
      color: var(--text);
      min-height: 100vh;
    }

    body.light-mode {
      background: #f0f2f5 !important;
      color: #1a1a1a !important;
    }

    a { color: inherit; text-decoration: none; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 22px;
      background: rgba(15, 23, 42, 0.9);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .topbar-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .topbar-btn,
    .primary-btn,
    .secondary-btn,
    .danger-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    .topbar-btn:hover,
    .primary-btn:hover,
    .secondary-btn:hover,
    .danger-btn:hover {
      transform: translateY(-1px);
    }

    .topbar-btn,
    .secondary-btn {
      background: rgba(30, 41, 59, 0.95);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.22);
    }

    .primary-btn {
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: #fff;
    }

    .danger-btn {
      background: rgba(239, 68, 68, 0.14);
      color: #fecaca;
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .page-shell {
      width: min(980px, calc(100% - 32px));
      margin: 28px auto 48px;
    }

    .hero-card,
    .profile-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero-card {
      padding: 22px 24px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
    }

    .hero-card h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .hero-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: #bae6fd;
      font-size: 0.92rem;
    }

    .profile-card {
      padding: 24px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 22px;
    }

    .info-panel,
    .form-panel {
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(15, 23, 42, 0.6);
    }

    .section-title {
      margin: 0 0 18px;
      font-size: 1.1rem;
    }

    .info-list {
      display: grid;
      gap: 14px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
    }

    .info-label {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .info-value {
      font-weight: 700;
      text-align: right;
    }

    .profile-form {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-weight: 700;
      color: #f8fafc;
    }

    .field input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(15, 23, 42, 0.88);
      color: var(--text);
      outline: none;
      font-size: 1rem;
    }

    .field input:focus {
      border-color: rgba(56, 189, 248, 0.9);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    .field input[readonly] {
      color: #cbd5e1;
      cursor: not-allowed;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 6px;
    }

    .status-message {
      margin-top: 12px;
      font-weight: 700;
      min-height: 24px;
    }

    .status-message.success {
      color: var(--success);
    }

    .status-message.error {
      color: var(--danger);
    }

    .guest-state {
      padding: 24px;
      text-align: center;
      background: var(--panel);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .guest-state h2 {
      margin-top: 0;
    }

    .guest-state p {
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.6;
    }

    @media (max-width: 820px) {
      .hero-card,
      .profile-grid {
        grid-template-columns: 1fr;
        display: grid;
      }

      .hero-card {
        justify-items: start;
      }

      .info-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .info-value {
        text-align: left;
      }
    }
  
/* ==========================================
       ORDER HISTORY PAGE — NEW STYLES
    ========================================== */

    /* Hero / Breadcrumb Section */
    .oh-hero {
      background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
      padding: 50px 0 40px;
      position: relative;
      overflow: hidden;
    }

    .oh-hero::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .oh-hero-inner {
      position: relative;
      z-index: 1;
    }

    .oh-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #9CA3AF;
      margin-bottom: 16px;
    }

    .oh-breadcrumb a {
      color: #9CA3AF;
      transition: color .2s;
    }

    .oh-breadcrumb a:hover {
      color: #2563EB;
    }

    .oh-breadcrumb i {
      font-size: 10px;
    }

    .oh-breadcrumb span {
      color: #fff;
      font-weight: 500;
    }

    .oh-title {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 700;
      color: #fff;
      margin: 0;
      line-height: 1.2;
    }

    .oh-title span {
      color: #2563EB;
    }

    .oh-subtitle {
      color: #9CA3AF;
      font-size: 15px;
      margin-top: 8px;
    }

    /* Filter Bar */
    .oh-filter-wrap {
      padding: 28px 0 8px;
    }

    .oh-filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .oh-filter-btn {
      padding: 9px 20px;
      border-radius: 50px;
      border: 1px solid #2A2A2A;
      background: #1E1E1E;
      color: #ccc;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .25s ease;
      font-family: 'Poppins', sans-serif;
    }

    .oh-filter-btn:hover {
      border-color: #2563EB;
      color: #fff;
      background: #1a2a4a;
    }

    .oh-filter-btn.active {
      background: #2563EB;
      border-color: #2563EB;
      color: #fff;
      box-shadow: 0 4px 14px rgba(37,99,235,0.35);
    }

    .oh-filter-btn .oh-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      min-width: 22px;
      height: 22px;
      font-size: 11px;
      font-weight: 700;
      padding: 0 6px;
      margin-left: 6px;
    }

    .oh-filter-btn.active .oh-count {
      background: rgba(255,255,255,0.25);
    }

    /* Orders List */
    .oh-list {
      padding: 20px 0 0;
    }

    .oh-empty {
      text-align: center;
      padding: 80px 20px;
      color: #555;
      display: none;
    }

    .oh-empty i {
      font-size: 64px;
      margin-bottom: 20px;
      color: #2A2A2A;
    }

    .oh-empty p {
      font-size: 17px;
    }

    /* Order Card */
    .oh-card {
      background: #1E1E1E;
      border: 1px solid #2A2A2A;
      border-radius: 20px;
      margin-bottom: 20px;
      overflow: hidden;
      transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease;
      animation: cardIn .4s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .oh-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border-color: #333;
    }

    /* Card Header */
    .oh-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 22px;
      border-bottom: 1px solid #2A2A2A;
      flex-wrap: wrap;
    }

    .oh-card-meta {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .oh-order-id {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .oh-order-id span {
      color: #2563EB;
    }

    .oh-order-date {
      font-size: 13px;
      color: #9CA3AF;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Status Badges */
    .oh-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .oh-status i {
      font-size: 10px;
    }

    .oh-status.completed {
      background: rgba(34,197,94,0.15);
      color: #22C55E;
      border: 1px solid rgba(34,197,94,0.3);
    }

    .oh-status.shipping {
      background: rgba(234,179,8,0.15);
      color: #EAB308;
      border: 1px solid rgba(234,179,8,0.3);
    }

    .oh-status.processing {
      background: rgba(37,99,235,0.15);
      color: #60A5FA;
      border: 1px solid rgba(37,99,235,0.3);
    }

    .oh-status.cancelled {
      background: rgba(239,68,68,0.15);
      color: #EF4444;
      border: 1px solid rgba(239,68,68,0.3);
    }

    /* Card Body — Products */
    .oh-card-body {
      padding: 18px 22px;
    }

    .oh-product-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .oh-product-item {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .oh-product-img {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid #2A2A2A;
      flex-shrink: 0;
    }

    .oh-product-info {
      flex: 1;
      min-width: 0;
    }

    .oh-product-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .oh-product-qty {
      font-size: 13px;
      color: #9CA3AF;
    }

    .oh-product-price {
      font-size: 15px;
      font-weight: 700;
      color: #2563EB;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Card Footer */
    .oh-card-foot {
      padding: 16px 22px;
      border-top: 1px solid #2A2A2A;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      background: rgba(0,0,0,0.15);
    }

    .oh-foot-info {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .oh-pay-method {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #9CA3AF;
    }

    .oh-pay-method i {
      color: #6B7280;
    }

    .oh-total-label {
      font-size: 13px;
      color: #9CA3AF;
    }

    .oh-total-value {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    /* Action Buttons */
    .oh-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .oh-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s ease;
      font-family: 'Poppins', sans-serif;
    }

    .oh-btn-detail {
      background: #1F2937;
      color: #fff;
      border: 1px solid #374151;
    }

    .oh-btn-detail:hover {
      background: #2563EB;
      border-color: #2563EB;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(37,99,235,0.3);
    }

    .oh-btn-rebuy {
      background: linear-gradient(135deg, #2563EB, #1D4ED8);
      color: #fff;
    }

    .oh-btn-rebuy:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(37,99,235,0.4);
      opacity: .92;
    }

    .oh-btn-cancel {
      background: rgba(239,68,68,0.1);
      color: #EF4444;
      border: 1px solid rgba(239,68,68,0.3);
    }

    .oh-btn-cancel:hover {
      background: #EF4444;
      color: #fff;
      transform: translateY(-2px);
    }

    .oh-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ==========================================
       DETAIL MODAL (BOOTSTRAP OVERRIDE)
    ========================================== */
    .oh-modal .modal-content {
      background: #1A1A1A;
      border: 1px solid #2A2A2A;
      border-radius: 20px;
      color: #fff;
    }

    .oh-modal .modal-header {
      border-bottom: 1px solid #2A2A2A;
      padding: 20px 24px;
    }

    .oh-modal .modal-title {
      font-size: 20px;
      font-weight: 700;
    }

    .oh-modal .btn-close {
      filter: invert(1) grayscale(100%) brightness(200%);
    }

    .oh-modal .modal-body {
      padding: 24px;
    }

    .oh-modal .modal-footer {
      border-top: 1px solid #2A2A2A;
      padding: 16px 24px;
      gap: 10px;
    }

    .oh-modal-section {
      margin-bottom: 24px;
    }

    .oh-modal-section:last-child {
      margin-bottom: 0;
    }

    .oh-modal-section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #6B7280;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .oh-modal-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2A2A2A;
    }

    .oh-modal-product {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #111;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #2A2A2A;
    }

    .oh-modal-product:last-child {
      margin-bottom: 0;
    }

    .oh-modal-product img {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .oh-modal-product-detail {
      flex: 1;
      min-width: 0;
    }

    .oh-modal-product-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .oh-modal-product-meta {
      font-size: 13px;
      color: #9CA3AF;
    }

    .oh-modal-product-price {
      font-size: 15px;
      font-weight: 700;
      color: #2563EB;
      white-space: nowrap;
    }

    .oh-info-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #2A2A2A;
      font-size: 14px;
    }

    .oh-info-row:last-child {
      border-bottom: none;
    }

    .oh-info-row label {
      color: #9CA3AF;
      font-weight: 500;
      flex-shrink: 0;
    }

    .oh-info-row span {
      color: #fff;
      font-weight: 600;
      text-align: right;
    }

    .oh-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px;
      background: rgba(37,99,235,0.08);
      border: 1px solid rgba(37,99,235,0.2);
      border-radius: 12px;
      margin-top: 16px;
    }

    .oh-total-row label {
      font-size: 14px;
      font-weight: 600;
      color: #9CA3AF;
    }

    .oh-total-row span {
      font-size: 22px;
      font-weight: 700;
      color: #2563EB;
    }

    /* Summary Stats Row */
    .oh-stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 14px;
      margin: 24px 0 28px;
    }

    .oh-stat-card {
      background: #1E1E1E;
      border: 1px solid #2A2A2A;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }

    .oh-stat-icon {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .oh-stat-value {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .oh-stat-label {
      font-size: 12px;
      color: #6B7280;
    }

    /* Responsive */
    @media(max-width: 768px) {
      .oh-card-head { flex-direction: column; align-items: flex-start; }
      .oh-card-foot { flex-direction: column; align-items: flex-start; }
      .oh-actions { width: 100%; }
      .oh-btn { flex: 1; justify-content: center; }
      .oh-product-img { width: 55px; height: 55px; }
    }

    @media(max-width: 480px) {
      .oh-filter-btn { font-size: 13px; padding: 8px 14px; }
      .oh-title { font-size: 26px; }
    }
    /* Light Mode Overrides */
    body.light-mode .oh-hero { background: #f0f2f5; border-bottom: 1px solid #e5e7eb; }
    body.light-mode .oh-hero::before { background: radial-gradient(circle, rgba(37,99,235,0.05) 0%, transparent 70%); }
    body.light-mode .oh-breadcrumb a, body.light-mode .oh-breadcrumb i { color: #6b7280; }
    body.light-mode .oh-breadcrumb span { color: #1a1a1a; }
    body.light-mode .oh-title { color: #1a1a1a; }
    body.light-mode .oh-subtitle { color: #4b5563; }
    body.light-mode .oh-filter-btn { background: #ffffff; border-color: #d1d5db; color: #4b5563; }
    body.light-mode .oh-filter-btn:hover { background: #f3f4f6; border-color: #9ca3af; color: #1a1a1a; }
    body.light-mode .oh-filter-btn.active { background: #2563eb; border-color: #2563eb; color: #ffffff; }
    body.light-mode .oh-filter-btn .oh-count { background: #f3f4f6; color: #1a1a1a; }
    body.light-mode .oh-filter-btn.active .oh-count { background: rgba(255,255,255,0.25); color: #ffffff; }
    body.light-mode .oh-card { background: #ffffff; border-color: #e5e7eb; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    body.light-mode .oh-card:hover { border-color: #d1d5db; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
    body.light-mode .oh-card-head { border-bottom-color: #e5e7eb; }
    body.light-mode .oh-order-id { color: #1a1a1a; }
    body.light-mode .oh-order-date { color: #6b7280; }

  <!-- Auth Script (GIỮ NGUYÊN) -->
  <script>
    const API_BASE = 'http://localhost:3000/api';
    const AUTH_KEY = 'smashshop_auth';
    const logoutBtn = document.getElementById('logoutBtn');
    const authStatus = document.getElementById('authStatus');

    let currentAuth = null;

    function getStoredAuth() {
      try {
        const raw = localStorage.getItem(AUTH_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        localStorage.removeItem(AUTH_KEY);
        return null;
      }
    }

    function clearAuth() {
      currentAuth = null;
      localStorage.removeItem(AUTH_KEY);
      updateAuthUI();
    }

    function updateAuthUI() {
      const auth = currentAuth || getStoredAuth();
      if (auth && auth.user) {
        if (logoutBtn) logoutBtn.style.display = 'inline-block';
      } else {
        if (logoutBtn) logoutBtn.style.display = 'none';
      }
    }

    async function apiRequest(endpoint, method, body) {
      const response = await fetch(`${API_BASE}${endpoint}`, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || 'Có lỗi xảy ra');
      return data;
    }

    if (logoutBtn) {
      logoutBtn.addEventListener('click', () => {
        clearAuth();
        window.location.href = '/SmashShop/index.html';
      });
    }

    currentAuth = getStoredAuth();
    updateAuthUI();

    window.addEventListener('storage', (e) => {
      if (e.key === AUTH_KEY) {
        currentAuth = getStoredAuth();
        updateAuthUI();
      }
    });
  </script>

  <!-- Order History Script -->
  <script>
    /* ==========================================
       ORDER HISTORY DATA
    ========================================== */
    let ordersData = [];

    /* ==========================================
       HELPERS
    ========================================== */
    const statusMap = {
      pending:   { label: 'Chờ xác nhận', icon: 'fa-clock', cls: 'processing' },
      confirmed: { label: 'Đã xác nhận', icon: 'fa-circle-check', cls: 'processing' },
      shipping:  { label: 'Đang giao', icon: 'fa-truck', cls: 'shipping' },
      delivered: { label: 'Đã nhận hàng', icon: 'fa-circle-check', cls: 'completed' },
      cancelled: { label: 'Đã hủy', icon: 'fa-circle-xmark', cls: 'cancelled' },
    };

    function formatVND(n) {
      return n.toLocaleString('vi-VN') + 'đ';
    }

    function calcTotal(products) {
      return products.reduce((sum, p) => sum + p.price * p.qty, 0);
    }

    function payIcon(method) {
      if (!method) return 'fa-building-columns';
      if (method.includes('COD')) return 'fa-money-bill-wave';
      if (method.includes('MoMo')) return 'fa-wallet';
      if (method.includes('Visa') || method.includes('tín dụng')) return 'fa-credit-card';
      return 'fa-building-columns';
    }

    function humanizePaymentMethod(code) {
      if (!code) return 'Chưa xác định';
      const mapping = {
        COD: 'Thanh toán khi nhận hàng (COD)',
        BANKING: 'Chuyển khoản ngân hàng',
        MOMO: 'Ví MoMo',
        CARD: 'Thẻ tín dụng / Visa',
        VNPAY: 'VNPay',
      };
      return mapping[code] || code;
    }

    function formatDate(iso) {
      if (!iso) return '';
      return new Intl.DateTimeFormat('vi-VN', {
        year: 'numeric', month: '2-digit', day: '2-digit',
      }).format(new Date(iso));
    }

    function getFullImageUrl(thumbnail) {
      if (!thumbnail) return 'https://picsum.photos/80?random=1';
      const url = String(thumbnail || '');
      if (url.startsWith('http://') || url.startsWith('https://')) return url;
      return 'http://localhost:3000' + (url.startsWith('/') ? url : '/' + url);
    }

    /* ==========================================
       RENDER STATS
    ========================================== */
    function renderStats() {
      const total = ordersData.length;
      const done = ordersData.filter((o) => o.status === 'delivered').length;
      const going = ordersData.filter((o) => o.status === 'shipping').length;
      const spent = ordersData.filter((o) => o.status !== 'cancelled').reduce((s, o) => s + calcTotal(o.products), 0);

      const statsEl = document.getElementById('ohStats');
      statsEl.innerHTML = `
        <div class="oh-stat-card">
          <div class="oh-stat-icon" style="color:#60A5FA;">📦</div>
          <div class="oh-stat-value" style="color:#60A5FA;">${total}</div>
          <div class="oh-stat-label">Tổng đơn hàng</div>
        </div>
        <div class="oh-stat-card">
          <div class="oh-stat-icon" style="color:#22C55E;">✅</div>
          <div class="oh-stat-value" style="color:#22C55E;">${done}</div>
          <div class="oh-stat-label">Hoàn thành</div>
        </div>
        <div class="oh-stat-card">
          <div class="oh-stat-icon" style="color:#EAB308;">🚚</div>
          <div class="oh-stat-value" style="color:#EAB308;">${going}</div>
          <div class="oh-stat-label">Đang giao</div>
        </div>
        <div class="oh-stat-card">
          <div class="oh-stat-icon" style="color:#2563EB;">💰</div>
          <div class="oh-stat-value" style="color:#2563EB; font-size:16px;">${formatVND(spent)}</div>
          <div class="oh-stat-label">Đã chi tiêu</div>
        </div>
      `;
    }

    /* ==========================================
       UPDATE FILTER COUNTS
    ========================================== */
    function updateCounts() {
      document.getElementById('cnt-all').textContent = ordersData.length;
      document.getElementById('cnt-processing').textContent = ordersData.filter((o) => ['pending', 'confirmed'].includes(o.status)).length;
      document.getElementById('cnt-shipping').textContent = ordersData.filter((o) => o.status === 'shipping').length;
      document.getElementById('cnt-completed').textContent = ordersData.filter((o) => o.status === 'delivered').length;
      document.getElementById('cnt-cancelled').textContent = ordersData.filter((o) => o.status === 'cancelled').length;
    }

    /* ==========================================
       RENDER ORDER CARD
    ========================================== */
    function renderCard(order) {
      const st = statusMap[order.status] || { label: 'Chờ xử lý', icon: 'fa-clock', cls: 'processing' };
      const orderId = order.id || order._id;
      const total = order.totalPrice || calcTotal(order.products);
      const canCancel = ['pending', 'confirmed'].includes(order.status);
      const canDeliver = order.status === 'shipping';

      const productsHTML = order.products.map((p) => {
        const name = p.name || p.productName || `Sản phẩm ${p.productId || ''}`;
        const qty = p.quantity || p.qty || 0;
        const price = p.price || 0;
        const img = getFullImageUrl(p.img || p.thumbnail || p.image);
        return `
          <div class="oh-product-item">
            <img class="oh-product-img" src="${img}" alt="${name}" loading="lazy">
            <div class="oh-product-info">
              <div class="oh-product-name">${name}</div>
              <div class="oh-product-qty">Số lượng: ${qty}</div>
            </div>
            <div class="oh-product-price">${formatVND(price * qty)}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="oh-card" data-order-id="${orderId}">
          <div class="oh-card-head">
            <div class="oh-card-meta">
              <div class="oh-order-id">Đơn hàng <span>#${orderId}</span></div>
              <div class="oh-order-date">
                <i class="fa-regular fa-calendar"></i> ${order.date || ''}
              </div>
            </div>
            <span class="oh-status ${st.cls}">
              <i class="fa-solid ${st.icon}"></i> ${st.label}
            </span>
          </div>

          <div class="oh-card-body">
            <div class="oh-product-list">${productsHTML}</div>
          </div>

          <div class="oh-card-foot">
            <div class="oh-foot-info">
              <div class="oh-pay-method">
                <i class="fa-solid ${payIcon(order.paymentMethod || order.payMethod || '')}"></i>
                ${humanizePaymentMethod(order.paymentMethod || order.payMethod || '')}
              </div>
              <div>
                <span class="oh-total-label">Phí vận chuyển: </span>
                <span class="oh-total-value">${formatVND(order.shippingCost || 0)}</span>
              </div>
            </div>
            <div class="oh-foot-info">
              <div>
                <span class="oh-total-label">Tổng tiền: </span>
                <span class="oh-total-value">${formatVND(total)}</span>
              </div>
            </div>
            <div class="oh-actions">
              <button class="oh-btn oh-btn-detail" onclick="openDetail('${orderId}')">
                <i class="fa-solid fa-eye"></i> Xem chi tiết
              </button>
              <button class="oh-btn oh-btn-rebuy" onclick="reBuy('${orderId}')">
                <i class="fa-solid fa-rotate-right"></i> Mua lại
              </button>
              ${canCancel ? `<button class="oh-btn oh-btn-cancel" onclick="cancelOrder('${orderId}')"><i class="fa-solid fa-ban"></i> Hủy đơn</button>` : ''}
              ${canDeliver ? `<button class="oh-btn oh-btn-detail" onclick="markDelivered('${orderId}')"><i class="fa-solid fa-check"></i> Đã nhận hàng</button>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    /* ==========================================
       RENDER LIST (WITH FILTER)
    ========================================== */
    let activeFilter = 'all';

    function renderList(filter) {
      activeFilter = filter || activeFilter;
      const list = document.getElementById('ohList');
      const empty = document.getElementById('ohEmpty');

      let filtered;
      if (activeFilter === 'all') {
        filtered = ordersData;
      } else if (activeFilter === 'processing') {
        filtered = ordersData.filter((o) => ['pending', 'confirmed'].includes(o.status));
      } else if (activeFilter === 'completed') {
        filtered = ordersData.filter((o) => o.status === 'delivered');
      } else {
        filtered = ordersData.filter((o) => o.status === activeFilter);
      }

      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        list.innerHTML = filtered.map(renderCard).join('');
      }

      updateCounts();
      renderStats();
    }

    /* ==========================================
       FILTER CLICKS
    ========================================== */
    document.getElementById('ohFilterBar').addEventListener('click', (e) => {
      const btn = e.target.closest('.oh-filter-btn');
      if (!btn) return;
      document.querySelectorAll('.oh-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList(btn.dataset.filter);
    });

    /* ==========================================
       MUA LẠI
    ========================================== */
    async function reBuy(orderId) {
      const order = ordersData.find((o) => (o.id || o._id) === orderId);
      if (!order) return;

      const userId = getUserId();
      if (!userId) {
        showToast('Vui lòng đăng nhập để mua lại.', 'error');
        return;
      }

      try {
        const cartData = await apiRequest(`/cart/${userId}`, 'GET');
        const existingItems = Array.isArray(cartData.cart?.items) ? cartData.cart.items : [];

        for (const item of order.products) {
          const productId =
            item.productId?._id ||
            item.productId?.id ||
            item.productId ||
            item.productId?.toString();
          const quantity = Number(item.quantity || item.qty || 1);
          if (!productId || quantity <= 0) continue;

          const existing = existingItems.find((ci) => {
            const existingId = ci.productId?._id || ci.productId?.id || ci.productId || ci.productId?.toString();
            return existingId === productId;
          });

          const newQuantity = (existing?.quantity || 0) + quantity;
          await apiRequest(`/cart/${userId}/update`, 'PUT', {
            productId,
            quantity: newQuantity,
          });
        }

        showToast(`Đã thêm ${order.products.length} sản phẩm từ đơn #${orderId} vào giỏ hàng.`, 'success');
        window.location.href = '/SmashShop/cart.html';
      } catch (error) {
        showToast(error.message || 'Không thể thêm sản phẩm vào giỏ hàng.', 'error');
      }
    }

    /* ==========================================
       HỦY ĐƠN
    ========================================== */
    async function cancelOrder(orderId) {
      const order = ordersData.find((o) => (o.id || o._id) === orderId);
      if (!order || !['pending', 'confirmed'].includes(order.status)) return;

      const confirmed = confirm(`Bạn có chắc muốn hủy đơn hàng #${orderId}?`);
      if (!confirmed) return;

      try {
        const userId = getUserId();
        const data = await apiRequest(`/orders/${orderId}/status`, 'PUT', {
          userId,
          status: 'cancelled',
        });
        order.status = data.order.status;
        renderList();
        showToast(`Đơn hàng #${orderId} đã được hủy.`, 'error');
      } catch (error) {
        showToast(error.message || 'Không thể hủy đơn hàng.', 'error');
      }
    }

    /* ==========================================
       ĐÁNH DẤU ĐÃ NHẬN HÀNG
    ========================================== */
    async function markDelivered(orderId) {
      const order = ordersData.find((o) => (o.id || o._id) === orderId);
      if (!order || order.status !== 'shipping') return;

      try {
        const userId = getUserId();
        const data = await apiRequest(`/orders/${orderId}/status`, 'PUT', {
          userId,
          status: 'delivered',
        });
        order.status = data.order.status;
        renderList();
        showToast(`Đơn hàng #${orderId} đã được đánh dấu là đã nhận.`, 'success');
      } catch (error) {
        showToast(error.message || 'Không thể cập nhật trạng thái.', 'error');
      }
    }

    /* ==========================================
       XEM CHI TIẾT — MỞ MODAL
    ========================================== */
    let currentDetailOrderId = null;

    function openDetail(orderId) {
      const order = ordersData.find((o) => (o.id || o._id) === orderId);
      if (!order) return;

      currentDetailOrderId = orderId;
      const st = statusMap[order.status] || { label: 'Chờ xử lý', icon: 'fa-clock', cls: 'processing' };
      const total = calcTotal(order.products);

      const productsHTML = order.products.map((p) => {
        const name = p.name || p.productName || `Sản phẩm ${p.productId || ''}`;
        const qty = p.quantity || p.qty || 0;
        const price = p.price || 0;
        const img = getFullImageUrl(p.img || p.thumbnail || p.image);
        return `
          <div class="oh-modal-product">
            <img src="${img}" alt="${name}" loading="lazy">
            <div class="oh-modal-product-detail">
              <div class="oh-modal-product-name">${name}</div>
              <div class="oh-modal-product-meta">Số lượng: ${qty} &nbsp;|&nbsp; Đơn giá: ${formatVND(price)}</div>
            </div>
            <div class="oh-modal-product-price">${formatVND(price * qty)}</div>
          </div>
        `;
      }).join('');

      document.getElementById('ohDetailBody').innerHTML = `
        <div class="oh-modal-section">
          <div class="oh-modal-section-title"><i class="fa-solid fa-bag-shopping"></i> Sản phẩm đã đặt</div>
          ${productsHTML}
          <div class="oh-total-row">
            <label>Tổng cộng</label>
            <span>${formatVND(total)}</span>
          </div>
        </div>

        <div class="oh-modal-section">
          <div class="oh-modal-section-title"><i class="fa-solid fa-circle-info"></i> Thông tin đơn hàng</div>
          <div class="oh-info-row">
            <label>Mã đơn hàng</label>
            <span>#${orderId}</span>
          </div>
          <div class="oh-info-row">
            <label>Ngày đặt hàng</label>
            <span>${order.date || ''}</span>
          </div>
          <div class="oh-info-row">
            <label>Trạng thái</label>
            <span class="oh-status ${st.cls}" style="font-size:12px;">
              <i class="fa-solid ${st.icon}"></i> ${st.label}
            </span>
          </div>
          <div class="oh-info-row">
            <label>Phương thức thanh toán</label>
            <span>${humanizePaymentMethod(order.paymentMethod || order.payMethod || '')}</span>
          </div>
          <div class="oh-info-row">
            <label>Phương thức vận chuyển</label>
            <span>${order.shippingMethod || 'Chưa chọn'}</span>
          </div>
          <div class="oh-info-row">
            <label>Phí vận chuyển</label>
            <span>${formatVND(order.shippingCost || 0)}</span>
          </div>
        </div>

        <div class="oh-modal-section">
          <div class="oh-modal-section-title"><i class="fa-solid fa-location-dot"></i> Thông tin nhận hàng</div>
          <div class="oh-info-row">
            <label>Địa chỉ</label>
            <span>${order.address}</span>
          </div>
          <div class="oh-info-row">
            <label>Số điện thoại</label>
            <span>${order.phone}</span>
          </div>
        </div>
      `;

      document.getElementById('ohDetailModalLabel').textContent = `Chi tiết đơn hàng #${order.id}`;

      // Set up Mua lại in modal
      const rebuyBtn = document.getElementById('ohModalRebuy');
      rebuyBtn.onclick = () => {
        reBuy(orderId);
        bootstrap.Modal.getInstance(document.getElementById('ohDetailModal')).hide();
      };

      const modalEl = document.getElementById('ohDetailModal');
      const modal = new bootstrap.Modal(modalEl);
      modal.show();
    }

    function getUserId() {
      const auth = currentAuth || getStoredAuth();
      return auth?.user?._id || localStorage.getItem('userId') || null;
    }

    async function loadOrders() {
      const userId = getUserId();
      const empty = document.getElementById('ohEmpty');
      if (!userId) {
        ordersData = [];
        renderList('all');
        if (empty) {
          empty.style.display = 'block';
          empty.innerHTML = '<i class="fa-regular fa-folder-open"></i><p>Vui lòng đăng nhập để xem lịch sử đơn hàng.</p>';
        }
        return;
      }

      try {
        const data = await apiRequest(`/orders/user/${userId}`, 'GET');
        ordersData = (data.orders || []).map((order) => ({
          ...order,
          id: order._id,
          date: formatDate(order.createdAt),
          products: (order.products || []).map((item) => ({
            ...item,
            qty: item.quantity,
            img: getFullImageUrl(
              item.img ||
              item.image ||
              item.thumbnail ||
              item.productId?.thumbnail ||
              (item.productId?.images && item.productId.images[0]) ||
              item.product?.thumbnail
            ),
            name:
              item.name ||
              item.productId?.name ||
              item.product?.name ||
              item.productName ||
              item.title ||
              "Sản phẩm",
          })),
        }));
        renderList('all');
      } catch (error) {
        showToast(error.message || 'Không thể tải đơn hàng.', 'error');
      }
    }

    /* ==========================================
       TOAST NOTIFICATION
    ========================================== */
    function showToast(message, type = 'success') {
      const existing = document.getElementById('ohToast');
      if (existing) existing.remove();

      const colors = {
        success: { bg: 'rgba(34,197,94,0.12)', border: 'rgba(34,197,94,0.35)', color: '#22C55E', icon: 'fa-circle-check' },
        error:   { bg: 'rgba(239,68,68,0.12)',  border: 'rgba(239,68,68,0.35)',  color: '#EF4444', icon: 'fa-circle-xmark' },
      };
      const c = colors[type] || colors.success;

      const toast = document.createElement('div');
      toast.id = 'ohToast';
      toast.style.cssText = `
        position: fixed;
        bottom: 28px;
        right: 24px;
        background: ${c.bg};
        border: 1px solid ${c.border};
        color: ${c.color};
        padding: 14px 20px;
        border-radius: 14px;
        font-size: 14px;
        font-weight: 600;
        font-family: 'Poppins', sans-serif;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 10px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        animation: slideIn .35s ease;
        max-width: 360px;
      `;
      toast.innerHTML = `<i class="fa-solid ${c.icon}"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    /* ==========================================
       INIT
    ========================================== */
    loadOrders();

    // ==========================================
    // THEME KHỞI TẠO (LIGHT/DARK)
    // ==========================================
    (function() {
      function applyTheme(theme) {
        if (theme === 'light') {
          document.body.classList.add('light-mode');
        } else {
          document.body.classList.remove('light-mode');
        }
      }
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) applyTheme(savedTheme);

      window.addEventListener('storage', (e) => {
        if (e.key === 'theme') applyTheme(e.newValue || 'dark');
      });
    })();
  </script>

</body>
</html>
